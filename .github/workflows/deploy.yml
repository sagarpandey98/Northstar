name: Deploy Activity-Service to GCP

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Matches the image name in your docker-compose.yml
          docker build -t ${{ secrets.DOCKER_USERNAME }}/northstar-activity:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/northstar-activity:latest

      - name: SSH and Update Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: sagaradavian
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/northstar
            # Verified service name: activity-tracker
            docker compose pull activity-tracker
            docker compose up -d activity-tracker
            docker image prune -f