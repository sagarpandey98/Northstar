# Application Name
spring.application.name=activity-tracker

# PostgreSQL Database Configuration
# Values come from environment variables in production
# Falls back to local defaults for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/activity_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sagar}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (JPA) Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://northstar-user:8082

# Server Configuration
server.port=8081

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO